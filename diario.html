<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Versículos Diarios - KLOHE</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #FDF8F6;
            color: #2C2424;
        }
        h1 {
            color: #6D435A;
            font-family: 'Playfair Display', serif;
        }
        .verse-list {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(44, 36, 36, 0.08);
        }
        .verse-item {
            padding: 15px;
            margin: 10px 0;
            background: #F5E6E0;
            border-left: 4px solid #6D435A;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>📖 Versículos Diarios</h1>
    <p>Esta página aloja los versículos que se muestran en la página principal de KLOHE.</p>
    
    <div class="verse-list" id="verseList">
        <!-- Los versículos se generan dinámicamente -->
    </div>

    <script>
        // Array de versículos bíblicos - Reina Valera 1960
        window.dailyVersesData = [
            { 
                text: "Todo lo puedo en Cristo que me fortalece.", 
                reference: "Filipenses 4:13" 
            },
            { 
                text: "El Señor es mi luz y mi salvación; ¿de quién temeré?", 
                reference: "Salmos 27:1" 
            },
            { 
                text: "Encomienda al Señor tu camino, y confía en él; y él hará.", 
                reference: "Salmos 37:5" 
            },
            { 
                text: "El gozo del corazón es la vida del hombre, y el alegría del hombre alarga sus días.", 
                reference: "Eclesiástico 30:22" 
            },
            { 
                text: "Porque yo sé los pensamientos que tengo acerca de vosotros, dice el Señor, pensamientos de paz, y no de mal.", 
                reference: "Jeremías 29:11" 
            },
            { 
                text: "El Señor peleará por vosotros, y vosotros estaréis tranquilos.", 
                reference: "Éxodo 14:14" 
            },
            { 
                text: "Esforzaos y cobrad ánimo; no temáis, ni tengáis miedo de ellos, porque el Señor tu Dios es el que va contigo.", 
                reference: "Deuteronomio 31:6" 
            },
            { 
                text: "Bendeciré al Señor en todo tiempo; su alabanza estará de continuo en mi boca.", 
                reference: "Salmos 34:1" 
            },
            { 
                text: "El Señor es mi pastor; nada me faltará.", 
                reference: "Salmos 23:1" 
            },
            { 
                text: "El que habita al abrigo del Altísimo, morará bajo la sombra del Omnipotente.", 
                reference: "Salmos 91:1" 
            },
            { 
                text: "Confía en el Señor de todo tu corazón, y no te apoyes en tu propia prudencia.", 
                reference: "Proverbios 3:5" 
            },
            { 
                text: "Porque donde esté vuestro tesoro, allí estará también vuestro corazón.", 
                reference: "Mateo 6:21" 
            },
            { 
                text: "Todo lo que hagáis, hacedlo de corazón, como para el Señor y no para los hombres.", 
                reference: "Colosenses 3:23" 
            },
            { 
                text: "El Señor te bendiga, y te guarde; el Señor haga resplandecer su rostro sobre ti, y tenga de ti misericordia.", 
                reference: "Números 6:24-25" 
            },
            { 
                text: "El que comenzó en vosotros la buena obra, la perfeccionará hasta el día de Jesucristo.", 
                reference: "Filipenses 1:6" 
            },
            { 
                text: "No os conforméis a este siglo, sino transformaos por medio de la renovación de vuestro entendimiento.", 
                reference: "Romanos 12:2" 
            },
            { 
                text: "El Señor es bueno, fortaleza en el día de la angustia; y conoce a los que en él confían.", 
                reference: "Nahúm 1:7" 
            },
            { 
                text: "Venid a mí todos los que estáis trabajados y cargados, y yo os haré descansar.", 
                reference: "Mateo 11:28" 
            },
            { 
                text: "El amor es paciente, es bondadoso; el amor no tiene envidia, el amor no es jactancioso, no se envanece.", 
                reference: "1 Corintios 13:4" 
            },
            { 
                text: "Mas buscad primero el reino de Dios y su justicia, y todas estas cosas se os añadirán.", 
                reference: "Mateo 6:33" 
            },
            { 
                text: "El Señor es mi roca, mi fortaleza y mi libertador; mi Dios, mi peña en quien confío.", 
                reference: "Salmos 18:2" 
            },
            { 
                text: "Porque somos hechura suya, creados en Cristo Jesús para buenas obras.", 
                reference: "Efesios 2:10" 
            },
            { 
                text: "El que tiene el Hijo, tiene la vida; el que no tiene al Hijo de Dios no tiene la vida.", 
                reference: "1 Juan 5:12" 
            },
            { 
                text: "Y sabemos que a los que aman a Dios, todas las cosas les ayudan a bien.", 
                reference: "Romanos 8:28" 
            },
            { 
                text: "El Señor es mi fuerza y mi escudo; mi corazón confió en él, y fui ayudado.", 
                reference: "Salmos 28:7" 
            },
            { 
                text: "Gracias sean dadas a Dios, que nos da la victoria por medio de nuestro Señor Jesucristo.", 
                reference: "1 Corintios 15:57" 
            },
            { 
                text: "El grito del justo es el Señor, y lo libra de todas sus angustias.", 
                reference: "Salmos 34:17" 
            },
            { 
                text: "El que habita al abrigo del Altísimo morará bajo la sombra del Omnipotente.", 
                reference: "Salmos 91:1" 
            },
            { 
                text: "Porque de él, y por él, y para él, son todas las cosas. A él sea la gloria por los siglos.", 
                reference: "Romanos 11:36" 
            },
            { 
                text: "El Señor es mi luz y mi salvación; ¿de quién temeré?", 
                reference: "Salmos 27:1" 
            },
            { 
                text: "En todo tiempo ama el amigo, y es como un hermano en tiempo de angustia.", 
                reference: "Proverbios 17:17" 
            }
        ];

        // Mostrar lista para referencia (opcional)
        document.addEventListener('DOMContentLoaded', function() {
            const list = document.getElementById('verseList');
            window.dailyVersesData.forEach((verse, index) => {
                const div = document.createElement('div');
                div.className = 'verse-item';
                div.innerHTML = `
                    <strong>Día ${index + 1}:</strong> "${verse.text}"<br>
                    <em>— ${verse.reference}</em>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
